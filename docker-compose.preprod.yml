services:
  postgres:
    networks:
      - cesizen-preprod-network
    build: .
    container_name: postgres-db-preprod
    env_file: ".env.preprod"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5433:5432"
    volumes:
      - postgres-data-preprod:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pg-bouncer:
    image: edoburu/pgbouncer:latest
    container_name: pg-bouncer-preprod
    ports:
      - "6433:6432"
    env_file: ".env.preprod"
    environment:
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      POOL_MODE: ${POOL_MODE:-transaction}
      MAX_CLIENT_CONN: ${MAX_CLIENT_CONN:-50}
      DEFAULT_POOL_SIZE: ${DEFAULT_POOL_SIZE:-10}
      MIN_POOL_SIZE: ${MIN_POOL_SIZE:-2}
      RESERVE_POOL_SIZE: ${RESERVE_POOL_SIZE:-2}
      LISTEN_ADDRESS: ${LISTEN_ADDRESS:-*}
      LISTEN_PORT: ${LISTEN_PORT:-6432}
      AUTH_TYPE: ${AUTH_TYPE:-scram-sha-256}
    networks:
      - cesizen-preprod-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h pg-bouncer -p 6432 -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    container_name: api-preprod
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/cesizen-api:preprod
    networks:
      - cesizen-preprod-network
    env_file:
      - .env.preprod
    environment:
      ASPNETCORE_ENVIRONMENT: Staging
    ports:
      - "5001:8080"
    restart: unless-stopped
    depends_on:
      pg-bouncer:
        condition: service_healthy

  backoffice:
    container_name: backoffice-preprod
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/cesizen-web:preprod
    networks:
      - cesizen-preprod-network
    ports:
      - "3001:3000"
    restart: unless-stopped
    depends_on:
      pg-bouncer:
        condition: service_healthy

volumes:
  postgres-data-preprod:
    driver: local

networks:
  cesizen-preprod-network:
    driver: bridge
